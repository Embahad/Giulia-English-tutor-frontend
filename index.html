<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI English Tutor Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #eef2ff, #ffffff);
}

.chat-box {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  max-width: 80%;
  white-space: pre-wrap;
}

.user {
  background: #4f46e5;
  color: white;
  margin-left: auto;
}

.ai {
  background: #f3f4f6;
}

.input-area {
  display: flex;
  gap: 8px;
  padding: 10px;
  border-top: 1px solid #ddd;
  background: white;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.send {
  background: #4f46e5;
  color: white;
}

.mic {
  background: #16a34a;
  color: white;
}
</style>
</head>

<body>

<h2 class="text-center p-3 font-bold">📘 AI English Tutor</h2>

<div id="chat" class="chat-box"></div>

<div class="input-area">

  <button class="mic" onclick="startMic()">🎤</button>

  <input id="input" placeholder="Type or speak..." />

  <button class="send" onclick="send()">Send</button>

</div>

<script>

const API = "https://giulia-english-tutor-backend-1.onrender.com";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + (type === "user" ? "user" : "ai");
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

//
// ✅ FIXED SPEECH FUNCTION (AI TALK BACK)
//
function speak(text) {
  if (!text) return;

  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";
  utterance.rate = 1;
  utterance.pitch = 1;
  utterance.volume = 1;

  // ensure voices load properly
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    utterance.voice = voices[0];
  }

  window.speechSynthesis.speak(utterance);
}

//
// ✅ SEND FUNCTION
//
window.send = async function () {

  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  addMsg("Thinking...", "ai");

  try {
    const res = await fetch(API + "/api/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sentence: text })
    });

    const data = await res.json();

    chat.removeChild(chat.lastChild);

    let reply = data.reply || "No response";

    if (data.rewrite) reply += "\n\n✍️ Rewrite: " + data.rewrite;
    if (data.sat_domain) reply += "\n📘 SAT: " + data.sat_domain;
    if (data.vocabulary_boost) reply += "\n🧠 Words: " + data.vocabulary_boost;
    if (data.study_tip) reply += "\n💡 Tip: " + data.study_tip;

    addMsg(reply, "ai");

    // 🔥 AI SPEAKS HERE
    setTimeout(() => speak(reply), 300);

  } catch (err) {
    chat.removeChild(chat.lastChild);
    addMsg("Error connecting to server", "ai");
  }
};

//
// 🎤 MIC FUNCTION
//
function startMic() {

  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Mic not supported in this browser");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onstart = () => {
    addMsg("🎤 Listening...", "ai");
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    input.value = text;
    send();
  };

  recognition.onerror = () => {
    addMsg("Mic error. Try again.", "ai");
  };

  recognition.start();
}

//
// 🔧 FIX: ensure voices load on mobile
//
window.speechSynthesis.onvoiceschanged = () => {
  window.speechSynthesis.getVoices();
};

addMsg("Welcome 👋 Type or speak a sentence!", "ai");

</script>

</body>
</html>
