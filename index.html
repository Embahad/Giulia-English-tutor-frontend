<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI English Tutor Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #eef2ff, #ffffff);
}

.face {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #4f46e5;
  margin: auto;
  position: relative;
  animation: pulse 2s infinite;
}

.eye {
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 40px;
}

.eye.left { left: 35px; }
.eye.right { right: 35px; }

.mouth {
  width: 30px;
  height: 10px;
  border-bottom: 3px solid white;
  position: absolute;
  bottom: 35px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
</style>
</head>

<body class="h-screen flex flex-col">

<div class="p-3 bg-white text-center shadow">
  <h1 class="font-bold">📘 AI English Tutor Pro</h1>
</div>

<div id="chat" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

<div class="p-3 bg-white border-t flex gap-2">
  <input id="input"
    class="flex-1 border p-2 rounded-xl"
    placeholder="Type your sentence..."
  />

  <button onclick="send()"
    class="bg-indigo-600 text-white px-4 rounded-xl">
    Send
  </button>
</div>

<script>

const API = "https://giulia-english-tutor-backend-1.onrender.com";

function addMsg(text, role) {
  const div = document.createElement("div");

  div.className =
    "p-3 rounded-xl max-w-[80%] whitespace-pre-wrap " +
    (role === "user"
      ? "bg-indigo-600 text-white ml-auto"
      : "bg-gray-100");

  div.innerText = text;

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

async function send(textOverride) {

  const input = document.getElementById("input");
  const text = textOverride || input.value;

  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  addMsg("Thinking...", "ai");

  try {
    const res = await fetch(API + "/api/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sentence: text })
    });

    const data = await res.json();

    // remove "Thinking..."
    const chat = document.getElementById("chat");
    chat.removeChild(chat.lastChild);

    let reply = data.reply || "No response";

    if (data.rewrite) reply += "\n\n✍️ Rewrite
