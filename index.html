<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI English Tutor Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #eef2ff, #ffffff);
}

.face {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #4f46e5;
  margin: auto;
  position: relative;
  animation: pulse 2s infinite;
}

.eye {
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 40px;
}

.eye.left { left: 35px; }
.eye.right { right: 35px; }

.mouth {
  width: 30px;
  height: 10px;
  border-bottom: 3px solid white;
  position: absolute;
  bottom: 35px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
</style>
</head>

<body class="h-screen flex flex-col">

<div class="p-3 bg-white text-center shadow">
  <h1 class="font-bold">📘 AI English Tutor Pro</h1>
</div>

<div class="p-2 flex justify-center">
  <button onclick="toggleMode()"
    class="bg-indigo-600 text-white px-4 py-2 rounded-xl">
    Switch Talk Mode 🎤
  </button>
</div>

<div id="chatMode" class="flex flex-col flex-1 p-3 overflow-y-auto">
  <div id="chat" class="space-y-2 flex flex-col"></div>
</div>

<div id="talkMode" class="hidden flex flex-col flex-1 items-center justify-center">

  <div class="face">
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
  </div>

  <p id="status" class="mt-6 text-gray-600">Tap mic and speak...</p>

</div>

<div class="p-3 bg-white border-t flex gap-2">

  <button onclick="startVoice()" class="bg-green-500 text-white px-4 rounded-xl">
    🎤
  </button>

  <input id="input"
    class="flex-1 border p-2 rounded-xl"
    placeholder="Type your sentence..."
  />

  <button onclick="send()"
    class="bg-indigo-600 text-white px-4 rounded-xl">
    Send
  </button>

</div>

<script>

const API = "https://giulia-english-tutor-backend-1.onrender.com";

let talkMode = false;

function toggleMode() {
  talkMode = !talkMode;
  document.getElementById("chatMode").classList.toggle("hidden");
  document.getElementById("talkMode").classList.toggle("hidden");
}

function addMsg(text, role) {
  const div = document.createElement("div");

  div.className =
    "p-3 rounded-xl max-w-[80%] whitespace-pre-wrap " +
    (role === "user"
      ? "bg-indigo-600 text-white ml-auto"
      : "bg-gray-100");

  div.innerText = text;

  document.getElementById("chat").appendChild(div);
}

async function send(textOverride) {

  const input = document.getElementById("input");
  const text = textOverride || input.value;

  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const res = await fetch(API + "/tutor", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  let reply = data.reply || "No response";

  if (data.rewrite) reply += "\n\n✍️ " + data.rewrite;

  addMsg(reply, "ai");
  speak(reply);
}

function startVoice() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    document.getElementById("status").innerText = "You said: " + text;
    send(text);
  };

  recognition.start();
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speech.pitch = 1;
  window.speechSynthesis.speak(speech);
}

addMsg("Welcome 👋 Type a sentence to start learning English!", "ai");

</script>

</body>
</html>
