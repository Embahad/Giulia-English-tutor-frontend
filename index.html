<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English Tutor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .app {
      max-width: 600px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px;
      margin: 6px 0;
      border-radius: 12px;
      max-width: 80%;
      white-space: pre-line;
    }

    .user {
      background: #4f46e5;
      color: white;
      align-self: flex-end;
      text-align: right;
    }

    .ai {
      background: #eee;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: white;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #4338ca;
    }
  </style>
</head>

<body>

<div class="app">

  <header>📘 English Tutor</header>

  <div class="chat" id="chat">
    <div class="msg ai">
Hi! I’m your AI English tutor 😊  
Write a sentence and I’ll help you improve it.
    </div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Type your sentence..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
/* ✅ UPDATED TO NEW GROQ BACKEND */
const API = "https://giulia-english-tutor-backend-1.onrender.com";

// Add message
function addMsg(text, type, id = null) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  if (id) div.id = id;

  document.getElementById("chat").appendChild(div);

  // auto scroll
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

// Send message
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const loadingId = "loading-" + Date.now();
  addMsg("Thinking...", "ai", loadingId);

  try {
    const res = await fetch(API + "/api/check", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ sentence: text })
    });

    const data = await res.json();

    console.log("Backend response:", data);

    // remove loading
    document.getElementById(loadingId)?.remove();

    let finalMessage = "";

    if (data.feedback) {
      finalMessage = data.feedback;

      if (data.sat_skill) {
        finalMessage += `\n\n🎯 Focus: ${data.sat_skill}`;
      }

      if (data.vocabulary_boost) {
        finalMessage += `\n💡 Vocab: ${data.vocabulary_boost}`;
      }

      if (data.suggestion) {
        finalMessage += `\n✍️ Rewrite: "${data.suggestion}"`;
      }

    } else if (data.error) {
      finalMessage = `⚠️ Backend Error: ${data.error}`;
    } else {
      finalMessage = `⚠️ Unexpected response:\n${JSON.stringify(data, null, 2)}`;
    }

    addMsg(finalMessage, "ai");

  } catch (err) {
    console.error(err);

    document.getElementById(loadingId)?.remove();

    addMsg("⚠️ Network error. Please try again.", "ai");
  }
}

// Enter key support
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    send();
  }
});
</script>

</body>
</html>
