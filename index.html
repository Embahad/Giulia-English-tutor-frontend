<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
    }

    body {
        background-color: #121212;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .phone-container {
        width: 100%;
        max-width: 400px;
        height: 100vh;
        max-height: 850px;
        background-color: #000;
        background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&q=80&w=400&h=800');
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
    }

    /* Header */
    .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px;
        background: linear-gradient(to bottom, rgba(20, 10, 10, 0.9), rgba(20, 10, 10, 0.4) 80%, transparent);
        color: white;
        z-index: 10;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .back-btn {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
    }

    .profile-info {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .profile-pic {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #f58433;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
    }

    .user-details h2 {
        font-size: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .user-details span {
        font-size: 12px;
        color: #4ade80; /* Green indicator */
    }

    /* Chat Area */
    .chat-body {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-bottom: 20px;
    }

    .chat-body::-webkit-scrollbar {
        width: 4px;
    }
    .chat-body::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
    }

    .message-row {
        display: flex;
        width: 100%;
    }

    .message-row.incoming {
        justify-content: flex-start;
        align-items: flex-end;
        gap: 8px;
    }

    .message-row.outgoing {
        justify-content: flex-end;
    }

    .profile-pic-small {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-color: #f58433;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        margin-bottom: 4px;
        color: white;
        flex-shrink: 0;
    }

    .bubble {
        padding: 10px 14px;
        font-size: 14.5px;
        line-height: 1.4;
        max-width: 80%;
        word-wrap: break-word;
        white-space: pre-wrap; /* Preserves newlines from backend */
        color: white;
    }

    .incoming .bubble {
        background-color: #3b3535;
        border-radius: 20px 20px 20px 4px;
    }

    .outgoing .bubble {
        background: linear-gradient(135deg, #ff8c42, #f54e2f);
        border-radius: 20px 20px 4px 20px;
    }

    /* Input Area */
    .chat-footer {
        padding: 10px 15px 15px;
        background: linear-gradient(to top, rgba(20, 10, 10, 0.9), transparent);
    }

    .input-bar {
        display: flex;
        align-items: center;
        background-color: #362826;
        border-radius: 30px;
        padding: 5px 10px 5px 5px;
        gap: 10px;
    }

    .mic-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background-color: #16a34a; 
        display: flex;
        justify-content: center;
        align-items: center;
        border: none;
        cursor: pointer;
        flex-shrink: 0;
    }

    .mic-btn svg {
        width: 20px;
        height: 20px;
        fill: white;
    }

    .msg-input {
        flex: 1;
        background: transparent;
        border: none;
        color: white;
        font-size: 15px;
        outline: none;
    }
    
    .msg-input::placeholder {
        color: #999;
    }

    .send-btn {
        background: none;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 5px;
    }

    .send-btn svg {
        width: 22px;
        height: 22px;
        stroke: #f58433; 
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

</style>
</head>
<body>

<div class="phone-container">
    
    <header class="chat-header">
        <div class="header-left">
            <button class="back-btn">&#8592;</button>
            <div class="profile-info">
                <div class="profile-pic">👋</div>
                <div class="user-details">
                    <h2>Embahad</h2>
                    <span>● Online</span>
                </div>
            </div>
        </div>
    </header>

    <main class="chat-body" id="chat">
        </main>

    <footer class="chat-footer">
        <div class="input-bar">
            <button class="mic-btn" onclick="startMic()">
                <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            
            <input type="text" id="input" class="msg-input" placeholder="Message...">
            
            <button class="send-btn" onclick="send()">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </footer>

</div>

<script>
const API = "https://giulia-english-tutor-backend-1.onrender.com";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
let tempMsgElement = null;

// Allow pressing Enter to send
input.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        send();
    }
});

// ---------------- CHAT ----------------
function addMsg(text, type, isTemp = false) {
    const row = document.createElement("div");
    row.className = "message-row " + (type === "user" ? "outgoing" : "incoming");
    
    let innerHTML = '';
    
    if (type === "ai") {
        innerHTML = `
            <div class="profile-pic-small">👋</div>
            <div class="bubble">${text}</div>
        `;
    } else {
        innerHTML = `<div class="bubble">${text}</div>`;
    }
    
    row.innerHTML = innerHTML;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;

    if (isTemp) {
        tempMsgElement = row;
    }
}

function removeTempMsg() {
    if (tempMsgElement && chat.contains(tempMsgElement)) {
        chat.removeChild(tempMsgElement);
        tempMsgElement = null;
    }
}

// ---------------- GPT-LEVEL SPEECH SYSTEM ----------------
async function speak(text) {
  if (!text) return;

  try {
    // 🔥 OPTIONAL: REAL AI VOICE (ElevenLabs / OpenAI TTS)
    const res = await fetch("https://api.elevenlabs.io/v1/text-to-speech/YOUR_VOICE_ID", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "xi-api-key": "YOUR_API_KEY"
      },
      body: JSON.stringify({
        text: text,
        model_id: "eleven_multilingual_v2"
      })
    });

    if (res.ok) {
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      audio.play();
      return;
    }

  } catch (e) {
    console.log("Falling back to browser voice");
  }

  // ---------------- FALLBACK VOICE ----------------
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();

  const preferred =
    voices.find(v => v.name.includes("Google")) ||
    voices.find(v => v.lang.includes("en-US")) ||
    voices[0];

  if (preferred) utterance.voice = preferred;

  utterance.lang = "en-US";
  utterance.rate = 0.95;
  utterance.pitch = 1.1;
  utterance.volume = 1;

  window.speechSynthesis.speak(utterance);
}

// ---------------- SEND ----------------
window.send = async function () {
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  removeTempMsg(); // Clear any existing "Listening..." states
  addMsg("Typing...", "ai", true); // Changed from "Thinking..." for a more natural chat feel

  try {
    const res = await fetch(API + "/api/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sentence: text })
    });

    const data = await res.json();

    removeTempMsg();

    let reply = data.reply || "No response";

    if (data.rewrite) reply += "\n\n✍️ Rewrite: " + data.rewrite;
    if (data.study_tip) reply += "\n💡 Tip: " + data.study_tip;

    addMsg(reply, "ai");

    setTimeout(() => speak(reply), 300);

  } catch (err) {
    removeTempMsg();
    addMsg("Error connecting to server", "ai");
  }
};

// ---------------- MIC ----------------
function startMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Mic not supported in this browser");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onstart = () => {
    removeTempMsg();
    addMsg("🎤 Listening...", "ai", true);
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    input.value = text;
    send();
  };

  recognition.onerror = () => {
    removeTempMsg();
    addMsg("Mic error or no audio detected.", "ai");
  };

  recognition.start();
}

// Initialize chat
window.onload = () => {
    addMsg("Hey what's up, how's you? Hey Embahad 👋", "ai");
};

</script>

</body>
</html>
