<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English Tutor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
    }

    .app {
      max-width: 600px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #4f46e5;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #eee;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      margin-left: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="app">

  <header>📘 English Tutor</header>

  <div class="chat" id="chat">
    <div class="msg ai">Hi! I’m your English tutor. Write a sentence 😊</div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Type here..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
const API = "https://giulia-english-tutor-backend.onrender.com";

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  try {
    const res = await fetch(API + "/api/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sentence: text })
    });

    const data = await res.json();
    addMsg(data.feedback, "ai");

  } catch (err) {
    addMsg("Error connecting to server 😢", "ai");
  }
}
</script>

</body>
</html>
