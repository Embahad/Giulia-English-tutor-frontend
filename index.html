<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Tutor App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 10px;
    }

    h2 {
      text-align: center;
    }

    .chat-box {
      background: white;
      height: 70vh;
      overflow-y: auto;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ddd;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #DCF8C6;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #eee;
      margin-right: auto;
    }

    .input-box {
      display: flex;
      margin-top: 10px;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: green;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>English Tutor 📚</h2>

  <div id="chat" class="chat-box"></div>

  <div class="input-box">
    <input id="input" placeholder="Type a sentence..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    addMessage("Typing...", "bot");

    try {
      const res = await fetch("https://giulia-english-tutor-backend-1.onrender.com/tutor", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      chat.removeChild(chat.lastChild); // remove "Typing..."

      addMessage(data.reply || "No response from tutor", "bot");

    } catch (err) {
      chat.removeChild(chat.lastChild);
      addMessage("Error connecting to server", "bot");
    }
  }

  input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
  });

  addMessage("Welcome 👋 Type a sentence to start learning English!", "bot");
</script>

</body>
</html>
